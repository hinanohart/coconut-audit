name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install uv
        run: pip install uv
      - name: Install ruff
        run: uv pip install --system ruff
      - name: Ruff format check
        run: ruff format --check src tests
      - name: Ruff lint
        run: ruff check src tests

  no-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Grep for token-shaped strings
        run: bash scripts/check_no_secrets.sh

  unit-cpu:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Install uv
        run: pip install uv
      - name: Install package + dev deps (CPU)
        run: |
          uv pip install --system -e ".[dev]"
      - name: Pytest (smoke + unit, CPU, skip slow/integration)
        env:
          COCONUT_AUDIT_SKIP_HF_DOWNLOAD: '1'
        run: pytest -ra -m "not slow and not integration"
